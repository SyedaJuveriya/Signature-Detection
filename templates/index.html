<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature fraud</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(51, 51, 51, 0.8); /* Semi-transparent navbar */
            padding: 15px;
            color: white;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            transition: color 0.3s ease-in-out;
            padding-right: 20px;
        }
        .navbar a:hover {
            color: #27e727; /* Gold color on hover */
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="title">Fraud Detection in Signature Verification </div>
        <div>
            <a href="/">Home</a>
            <a href="/login">Login</a>
        </div>
    </div>

    <div class="video-container">
        <video autoplay muted loop>
            <source src="../static/img/v1.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="video-overlay">
            <h1>Fraud Detection in Signature Verification </h1>
            <p>Using Advanced Image Processing Techniques for Real-Time Authentication </p>
        </div>
    </div>

</body>
</html>
