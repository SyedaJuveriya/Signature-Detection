<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Verification - Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: url('{{ bg_image }}') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            animation: fadeIn 1.5s ease-in-out;
        }

        /* Fade In Animation */
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        .navbar {
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            animation: slideIn 0.8s ease-out;
        }

        /* Slide In Animation for Navbar */
        @keyframes slideIn {
            0% {
                transform: translateY(-100%);
            }
            100% {
                transform: translateY(0);
            }
        }

        .navbar ul {
            list-style: none;
            display: flex;
            padding: 0;
            margin: 0;
        }

        .navbar ul li {
            margin: 0 15px;
        }

        .navbar ul li a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .navbar ul li a:hover {
            color: #2ebe11;
            transform: scale(1.1);
        }

        .container {
            margin-top: 100px;
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.3);
            animation: bounceIn 1s ease-out;
        }

        /* Bounce In Animation */
        @keyframes bounceIn {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .animated-heading {
            font-size: 28px;
            margin-bottom: 20px;
            animation: fadeInUp 1s ease-out;
        }

        /* Fade In Up for Heading */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="title">Fraud Detection in Signature Verification </div>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/predict">Prediction</a></li>
            
            <li><a href="/logout">Logout</a></li>
        </ul>
    </nav>

    <div class="container animated-container">
        <p class="animated-heading">Prediction Result</p>
        <h1> {{result}}  </h1>
    </div>

    <div class="footer">
        <p>&copy; 2025 DNA Sequence Prediction. All rights reserved.</p>
    </div>
</body>
</html>
