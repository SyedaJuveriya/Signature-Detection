<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Sequence Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: url('../static/img/p3.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            animation: fadeIn 1.5s ease-in-out;
        }

        /* Animations */
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes slideIn { 0% { transform: translateY(-100%); } 100% { transform: translateY(0); } }
        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Navbar */
        .navbar {
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            animation: slideIn 0.8s ease-out;
        }
        .navbar ul {
            list-style: none;
            display: flex;
            padding: 0;
            margin: 0;
        }
        .navbar ul li {
            margin: 0 15px;
        }
        .navbar ul li a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }
        .navbar ul li a:hover {
            color: #165de0;
            transform: scale(1.1);
        }

        /* Container */
        .container {
            margin-top: 100px;
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.3);
            animation: bounceIn 1s ease-out;
            width: 90%;
            max-width: 500px;
        }

        .animated-heading {
            font-size: 28px;
            margin-bottom: 20px;
        }

        /* Image Upload */
        #imageUpload {
            display: none;
        }
        .upload-label {
            display: inline-block;
            padding: 12px 25px;
            background: #0f1ee7;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.4s;
            animation: bounce 0.5s infinite alternate;
        }
        .upload-label:hover {
            background: #45cf0f;
            transform: scale(1.1);
        }

        /* Image Preview */
        #imagePreview {
            margin: 20px 0;
            max-width: 100%;
            max-height: 300px;
            border: 3px solid #192de4;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(24, 83, 245, 0.8);
            display: none;
        }

        /* Submit Button */
        .animated-button {
            padding: 12px 25px;
            background: #3498db;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.4s;
        }
        .animated-button:hover {
            background: #2980b9;
            transform: scale(1.1);
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="title">Fraud Detection in Signature Verification </div>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/predict">Prediction</a></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
    </nav>

    <!-- Container -->
    <div class="container animated-container">
        <h2 class="animated-heading">Upload Image for Prediction</h2>
        <form id="upload-form" method="post" enctype="multipart/form-data" action="/predict">
            <!-- Upload Input -->
            <label for="imageUpload" class="upload-label">Choose Image</label>
            <input type="file" name="file" id="imageUpload" accept=".png, .jpg, .jpeg" required>

            <!-- Image Preview -->
            <img id="imagePreview" alt="Image Preview">

            <!-- Submit Button -->
            <button type="submit" class="animated-button">Predict</button>
        </form>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>&copy; 2025 DNA Sequence Prediction. All rights reserved.</p>
    </div>

    <script>
        // Image Preview Functionality
        const imageUpload = document.getElementById('imageUpload');
        const imagePreview = document.getElementById('imagePreview');

        imageUpload.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                imagePreview.style.display = 'none';
            }
        });
    </script>
</body>
</html>
